name: CI tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/App.Api.sln

      - name: Build
        run: dotnet build src/App.Api.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/App.Api.sln --configuration Release --no-build --verbosity normal
